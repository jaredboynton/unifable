[pytest]
# Pin to 8 workers, not -n auto. The suite is 1367 fast tests; each xdist worker
# re-imports conftest + heavy gate modules at startup, so beyond ~8 workers the
# per-worker startup + IPC + CPU contention (test-all runs the standalone harnesses
# concurrently) dominates and the run gets slower, not faster. Measured on a 16-core
# M4 Max: -n 8 ~= 6.5s vs -n auto (16) ~= 12s for the same suite.
addopts = -n 8 --dist=worksteal
testpaths = tests
