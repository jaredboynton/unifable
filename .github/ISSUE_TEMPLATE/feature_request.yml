name: Feature request
description: Propose a bounded change to unifable.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer pain should this solve?
      placeholder: When ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Hooks
        - Evidence gate
        - Groundedness breaker
        - Unifusion
        - Install or setup
        - Tests or evals
        - Documentation
        - Unsure
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this is done?
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: Which command, test, or manual check should prove it?
      placeholder: just test-parallel
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any simpler option that does not cover the need.
    validations:
      required: false
